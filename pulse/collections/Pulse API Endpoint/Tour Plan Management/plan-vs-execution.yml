runtime:
  scripts:
    - type: after-response
      code: |-
        var template = `
        <h2 style="text-align: center; color: #333; font-family: Arial, sans-serif;">Plan vs Execution Dashboard</h2>

        <div style="display: flex; flex-wrap: wrap; justify-content: space-around; padding: 20px;">
            <div style="width: 48%; min-width: 400px; margin-bottom: 20px;">
                <canvas id="geoFenceChart" height="200"></canvas>
            </div>
            <div style="width: 48%; min-width: 400px; margin-bottom: 20px;">
                <canvas id="subMarketsChart" height="200"></canvas>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js"></script>
        <script>
        //     pm.getData(function (err, value) {
                var data = value.chartData;
                
                // Line Chart - GeoFence Touch Count
                var ctx1 = document.getElementById("geoFenceChart").getContext("2d");
                new Chart(ctx1, {
                    type: "line",
                    data: {
                        labels: data.dates,
                        datasets: [{
                            label: "GeoFence Touch Count",
                            data: data.geoFenceTouchCounts,
                            borderColor: "#3498db",
                            backgroundColor: "rgba(52, 152, 219, 0.2)",
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: "#3498db",
                            pointRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        title: {
                            display: true,
                            text: "Daily GeoFence Touch Count (7-Day Period)",
                            fontSize: 16
                        },
                        legend: {
                            display: true,
                            position: "bottom"
                        },
                        scales: {
                            xAxes: [{
                                display: true,
                                scaleLabel: {
                                    display: true,
                                    labelString: "Date"
                                }
                            }],
                            yAxes: [{
                                display: true,
                                scaleLabel: {
                                    display: true,
                                    labelString: "Touch Count"
                                },
                                ticks: {
                                    beginAtZero: true
                                }
                            }]
                        }
                    }
                });

                // Bar Chart - Planned vs Executed Sub-Markets
                var ctx2 = document.getElementById("subMarketsChart").getContext("2d");
                new Chart(ctx2, {
                    type: "bar",
                    data: {
                        labels: data.dates,
                        datasets: [{
                            label: "Planned Sub-Markets",
                            data: data.plannedCounts,
                            backgroundColor: "rgba(46, 204, 113, 0.7)",
                            borderColor: "#27ae60",
                            borderWidth: 1
                        }, {
                            label: "Executed Sub-Markets",
                            data: data.executedCounts,
                            backgroundColor: "rgba(155, 89, 182, 0.7)",
                            borderColor: "#8e44ad",
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        title: {
                            display: true,
                            text: "Planned vs Executed Sub-Markets by Day",
                            fontSize: 16
                        },
                        legend: {
                            display: true,
                            position: "bottom"
                        },
                        scales: {
                            xAxes: [{
                                display: true,
                                scaleLabel: {
                                    display: true,
                                    labelString: "Date"
                                }
                            }],
                            yAxes: [{
                                display: true,
                                scaleLabel: {
                                    display: true,
                                    labelString: "Number of Sub-Markets"
                                },
                                ticks: {
                                    beginAtZero: true,
                                    stepSize: 1
                                }
                            }]
                        }
                    }
                });
            });
        </script>
        `;

        function constructVisualizerPayload() {
            var response = res.getBody();
            var dailyDetails = response.data.dailyDetails || [];
            
            var dates = [];
            var geoFenceTouchCounts = [];
            var plannedCounts = [];
            var executedCounts = [];
            
            dailyDetails.forEach(function(day) {
                // Format date nicely (e.g., "Jan 28")
                var dateObj = new Date(day.date);
                var options = { month: 'short', day: 'numeric' };
                var formattedDate = dateObj.toLocaleDateString('en-US', options);
                
                dates.push(formattedDate);
                geoFenceTouchCounts.push(day.geoFenceTouchCount || 0);
                plannedCounts.push(day.plannedSubMarkets ? day.plannedSubMarkets.length : 0);
                executedCounts.push(day.executedSubMarkets ? day.executedSubMarkets.length : 0);
            });
            
            return {
                chartData: {
                    dates: dates,
                    geoFenceTouchCounts: geoFenceTouchCounts,
                    plannedCounts: plannedCounts,
                    executedCounts: executedCounts
                }
            };
        }

        // pm.visualizer.set(template, constructVisualizerPayload());

