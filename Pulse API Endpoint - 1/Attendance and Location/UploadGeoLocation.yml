info:
  name: UploadGeoLocation
  type: http
  seq: 1

http:
  method: POST
  url: "{{pulse_api}}/GeoLocation/UploadGeoLocation"
  body:
    type: json
    data: "[\r

      \    {\r

      \        \"UserCode\": \"your_user_code_here\",\r

      \        \"DeviceId\": \"your_device_id_here\",\r

      \        \"Source\": \"your_source_here\",\r

      \        \"Provider\": \"your_provider_here\",\r

      \        \"Lat\": \"your_latitude_here\",\r

      \        \"Lon\": \"your_longitude_here\",\r

      \        \"GeoAddress\": \"your_geo_address_here\",\r

      \        \"TrackingTime\": \"your_tracking_time_here\"\r

      \    }\r

      ]"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

